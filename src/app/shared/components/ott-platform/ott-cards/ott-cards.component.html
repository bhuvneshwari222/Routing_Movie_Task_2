<mat-card class="ottCard mb-4" [routerLink]="getOttObj.ottId" routerLinkActive="active">
    <h1>{{getOttObj.platformName}}</h1>
    <div class="movieInfo">
        <p class="m-0">Founded Year: {{getOttObj.foundedYear}}</p>
        <p class="m-0">Total Movies: {{getOttObj.totalMovies}}</p>
    </div>
</mat-card>
